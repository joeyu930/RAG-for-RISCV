<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RISC-V Hardware Assistant</title>
    <meta name="description" content="AI Assistant for RISC-V Hardware Design, powered by Local RAG" />
    <link rel="stylesheet" href="./style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="glass-panel">
        <div class="logo">
          <h1>RISC-V Assistant</h1>
          <span class="badge">RAG</span>
        </div>
        <div class="connection-status">
          <span class="dot"></span> Local LLM Active
        </div>
      </header>
      
      <main class="chat-window">
        <div id="chat-history" class="messages-container">
          <div class="message system">
            <div class="avatar">SYS</div>
            <div class="message-content">
              Welcome to the RISC-V Architecture Assistant. I am grounded on the official standard ISA manuals. How can I help you with your hardware design today?
            </div>
          </div>
        </div>
        
        <div class="input-panel glass-panel">
          <form id="chat-form">
            <input 
              type="text" 
              id="user-input" 
              placeholder="Ask about RV32I instructions, Privilege Modes, Vector extensions..." 
              autocomplete="off" 
              required
            />
            <button type="submit" id="send-btn">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </form>
        </div>
      </main>
    </div>
    <script type="module" src="./main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </body>
</html>
